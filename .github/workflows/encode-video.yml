name: Super-AV1-Encoder
on: [workflow_dispatch]

jobs:
  encode:
    runs-on: ubuntu-latest
    steps:
      - name: Install gdown and ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install gdown

      - name: Download From Drive
        run: |
          # استبدل الـ ID بالخاص بك (الذي ينتهي بـ gw)
          gdown --id "16uvpleoh7qafxs9yxi6mck0-y1ddcdgw" -O input.mkv

      - name: Start AV1 Encoding
        run: |
          # تأكد أن اسم الملف المحمل هو input.mkv
          ffmpeg -i input.mkv -c:v libsvtav1 -preset 8 -crf 26 -pix_fmt yuv420p10le -svtav1-params tune=0:film-grain=8 -c:a libopus -b:a 96k output_av1.mkv

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: encoded-video
          path: output_av1.mkv
